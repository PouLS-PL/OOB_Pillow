name: Test Pipeline

on:
  workflow_dispatch:
    inputs:
      test_level:
        description: 'Test level to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - functional
          - performance

jobs:
  functional-tests:
    name: Functional Tests
    runs-on: ubuntu-latest
    if: github.event.inputs.test_level == 'all' || github.event.inputs.test_level == 'functional'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-cov

      - name: Run functional tests
        run: |
          pytest tests/ -v --cov=. --cov-report=xml

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        if: always()
        with:
          files: ./coverage.xml
          flags: functional

  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    if: github.event.inputs.test_level == 'all' || github.event.inputs.test_level == 'performance'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-benchmark

      - name: Run performance tests
        run: |
          pytest tests/ -v --benchmark-only --benchmark-json=benchmark.json

      - name: Store benchmark results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: benchmark-results
          path: benchmark.json
          retention-days: 30

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [functional-tests, performance-tests]
    if: always() && (needs.functional-tests.result != 'skipped' || needs.performance-tests.result != 'skipped')
    steps:
      - name: Check test results
        run: |
          # Sprawdzanie statusów poprzednich jobów
          FUNC_RESULT="${{ needs.functional-tests.result }}"
          PERF_RESULT="${{ needs.performance-tests.result }}"
          
          if [[ "$FUNC_RESULT" == "failure" || "$PERF_RESULT" == "failure" ]]; then
            echo "Not all tests passed"
            exit 1
          elif [[ "$FUNC_RESULT" == "skipped" && "$PERF_RESULT" == "skipped" ]]; then
            echo "Tests were skipped"
          else
            echo "All tests passed"
          fi
