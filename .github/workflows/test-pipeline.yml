name: Test Pipeline

on:
  push:
    branches: [ main ]       
  pull_request:
    branches: [ main ]     
  workflow_dispatch:        
    inputs:
      test_level:
        description: 'Test level to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - functional
          - performance

jobs:
  functional-tests:
    name: Functional Tests
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' || 
      github.event_name == 'pull_request' || 
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.test_level == 'all' || github.event.inputs.test_level == 'functional'))
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
      # IMPORTANT!!!!: Deprecation warnings regarding Node.js versions in this step 
      # are related to GitHub's runner environment and do not affect test execution.
      # They can be safely ignored as actions are already upgraded to v4/v5.
      
      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-cov
          
      - name: Lint with Ruff
        run: |
          pip install ruff
          ruff check .
          
      #tests 
      - name: Run functional tests
        run: |
          pytest tests/functional/ -v --cov=. --cov-report=xml

      # Upgraded to v5 to support newer Node.js runners
      - name: Upload coverage reports
        uses: codecov/codecov-action@v5
        if: always()
        with:
          files: ./coverage.xml
          flags: functional

  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' || 
      github.event_name == 'pull_request' || 
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.test_level == 'all' || github.event.inputs.test_level == 'performance'))
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-benchmark

      #crash prevent if performance folder empty 
      - name: Run performance tests
        run: |
          pytest tests/performance/ -v --benchmark-only --benchmark-json=benchmark.json || [ $? -eq 5 ]

      #added timestamp + crash prevent 
      - name: Create filename timestamp
        if: success() && hashFiles('benchmark.json') != ''
        id: format_date
        run: echo "date_string=$(date +'%Y-%m-%d_%H-%M-%S')" >> $GITHUB_OUTPUT

      - name: Store benchmark results
        if: success() && hashFiles('benchmark.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ steps.format_date.outputs.date_string }}
          path: benchmark.json
          retention-days: 30

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [functional-tests, performance-tests]
    if: always() && (needs.functional-tests.result != 'skipped' || needs.performance-tests.result != 'skipped')
    steps:
      - name: Generate Markdown Summary
        run: |
          FUNC_RES="${{ needs.functional-tests.result }}"
          PERF_RES="${{ needs.performance-tests.result }}"
          
          echo "## Test summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Type of test | Result |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          
          if [[ "$FUNC_RES" == "success" ]]; then echo "| Functional | PASSED |" >> $GITHUB_STEP_SUMMARY; fi
          if [[ "$FUNC_RES" == "failure" ]]; then echo "| Functional |  FAILED |" >> $GITHUB_STEP_SUMMARY; fi
          if [[ "$FUNC_RES" == "skipped" ]]; then echo "| Functional |  SKIPPED |" >> $GITHUB_STEP_SUMMARY; fi
          
          if [[ "$PERF_RES" == "success" ]]; then echo "| Performance |  PASSED |" >> $GITHUB_STEP_SUMMARY; fi
          if [[ "$PERF_RES" == "failure" ]]; then echo "| Performance |  FAILED |" >> $GITHUB_STEP_SUMMARY; fi
          if [[ "$PERF_RES" == "skipped" ]]; then echo "| Performance |  SKIPPED |" >> $GITHUB_STEP_SUMMARY; fi


          if [[ "$FUNC_RES" == "failure" || "$PERF_RES" == "failure" ]]; then
            exit 1
          fi
